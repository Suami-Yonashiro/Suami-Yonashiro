name: Update GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * *' # Roda automaticamente todos os dias à meia-noite
  workflow_dispatch: # Permite rodar manualmente a qualquer momento

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Garante a permissão de escrita no repositório
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Generate General Stats Card
        uses: stats-organization/github-readme-stats-action@v1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          card: stats
          options: "username=Suami-Yonashiro&show_icons=true&theme=transparent&locale=pt-br&include_all_commits=true&count_private=true"
          token: ${{ secrets.PAT }}
          path: stats.svg
          commit_message: "chore: update readme stats SVGs" # Faz o commit automático de forma nativa e segura

